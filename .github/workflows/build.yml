name: Build Debug APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Kita pakai action setup-gradle resmi, jadi tidak perlu
      # menyertakan file binary gradle-wrapper.jar di repo.
      # Action ini otomatis mendownload & menjalankan Gradle yang benar.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission (jaga-jaga jika gradlew ada)
        run: chmod +x ./gradlew || true

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
